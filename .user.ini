; Bazar Mix da Jô — limites de PHP para uploads de até 20 MB por foto.
; .user.ini é lido pelo PHP em modo CGI/FastCGI (Hostinger compartilhado).
; Coloque este arquivo no mesmo diretório do index.php (public_html).
; Após editar, pode demorar até 5 minutos para o PHP recarregar (user_ini.cache_ttl).

upload_max_filesize = 25M
post_max_size       = 100M
memory_limit        = 256M
max_execution_time  = 120
max_input_time      = 120
max_file_uploads    = 20
